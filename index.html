<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>lily酱的许愿池 ✨</title>
    <!-- 禁止缓存：微信内置浏览器、iOS Safari 添加到主屏幕都会缓存 HTML，必须显式禁止 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <link rel="stylesheet" href="style.css?t=1">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#ff6b8a">
    <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js" async></script>
</head>
<body>
    <header class="top-bar">
        <div class="top-inner">
            <div class="title-wrap">
                <h1>lily酱的许愿池 🎀</h1>
                <div class="subtitle">每一个小心愿 都值得被看见 ♡</div>
            </div>
            <div class="top-btns" id="top-btns">
                <button class="btn-admin" id="btn-admin" onclick="toggleAdmin()">管理</button>
            </div>
        </div>
    </header>

    <!-- 感谢语横幅（顶部） -->
    <div class="thanks-banner">
        <div class="thanks-banner-inner">
            💕 谢谢你来逛 lily酱的许愿池 ～
            <br>为了让你不纠结，让礼物送到我的心坎上，我准备了这个网站 ♡
            <br><span class="thanks-highlight">礼物不在于价格，而在于合适 ～ 挑选你的心意，让我感受你的温暖 🎀</span>
        </div>
    </div>

    <!-- 同步状态提示 -->
    <div class="sync-bar" id="sync-bar">
        <span id="sync-icon">⏳</span>
        <span id="sync-text">正在连接云端...</span>
        <button class="btn-retry-sync" id="btn-retry-sync" onclick="retrySync()" title="重新连接云端" style="display:none;">🔄 重试</button>
        <button class="btn-refresh" onclick="refreshPage()" title="刷新页面数据">🔄</button>
    </div>

    <!-- 管理员登录行（内联，非弹窗） -->
    <div class="admin-login-bar" id="admin-login-bar" style="display:none;">
        <input type="password" id="pwd-input" placeholder="输入管理密码" class="input-pwd-inline" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="btn-login-inline" onclick="doLogin()">进入</button>
    </div>

    <!-- 管理员工具栏（登录后显示） -->
    <div class="admin-toolbar" id="admin-toolbar" style="display:none;">
        <button class="btn-add-inline" onclick="toggleAddForm()">＋ 添加新礼物</button>
        <button class="btn-exit-inline" onclick="exitAdmin()">退出管理</button>
    </div>

    <!-- 添加新礼物表单（内联展开，非弹窗） -->
    <div class="add-form-wrap" id="add-form-wrap" style="display:none;">
        <div class="add-form-inner">
            <div class="add-form-title">➕ 添加新礼物</div>

            <!-- OCR 截图识别 -->
            <div class="fetch-section">
                <div class="fetch-title">📷 上传截图自动识别</div>
                <div class="ocr-upload-area" onclick="document.getElementById('ocr-file-input').click()">
                    <div class="ocr-upload-icon">📷</div>
                    <div class="ocr-upload-text">点击上传商品截图</div>
                    <div class="ocr-upload-hint">自动识别名称+价格+图片</div>
                </div>
                <input type="file" id="ocr-file-input" accept="image/*" style="display:none;" onchange="handleOcrUpload(event)">
                <div class="ocr-progress" id="ocr-progress" style="display:none;">
                    <div class="ocr-progress-text" id="ocr-progress-text">正在识别...</div>
                    <div class="ocr-progress-bar"><div class="ocr-progress-fill" id="ocr-progress-fill"></div></div>
                </div>
                <div class="fetch-result" id="ocr-result"></div>
            </div>

            <!-- 快速粘贴 -->
            <div class="fetch-section">
                <div class="fetch-title">⚡ 快速粘贴</div>
                <textarea id="quick-paste" placeholder="粘贴商品标题+价格，例如：&#10;联想显示器 L24-4C&#10;¥575" class="quick-paste-box"></textarea>
                <button type="button" class="fetch-btn" onclick="quickParse()" style="width:100%;margin-top:8px;">一键识别填入</button>
            </div>

            <hr class="divider">

            <!-- 手动填写表单 -->
            <div class="field">
                <label>商品图片</label>
                <div id="image-preview" class="image-preview-inline" onclick="document.getElementById('new-img-input').click()">
                    <div class="image-placeholder">📷 点击上传图片</div>
                </div>
                <input type="file" id="new-img-input" accept="image/*" style="display:none;" onchange="handleNewImage(event)">
                <input type="text" id="edit-image-url" placeholder="或输入图片网址（选填）" class="input-img-url" oninput="setImageFromUrl(this.value)">
                <input type="hidden" id="edit-image">
            </div>

            <div class="field">
                <label>礼物名称 *</label>
                <input type="text" id="edit-name" placeholder="输入商品名称">
            </div>
            <div class="field-inline">
                <div class="field">
                    <label>价格（元）*</label>
                    <input type="number" id="edit-price" placeholder="0" min="0">
                </div>
                <div class="field">
                    <label>分类</label>
                    <select id="edit-cat">
                        <option value="护肤">✨ 护肤</option>
                        <option value="数码">💻 数码</option>
                        <option value="家电">🏠 家电</option>
                        <option value="日用">🧴 日用</option>
                        <option value="鞋包">👢 鞋包</option>
                        <option value="衣服">👗 衣服</option>
                        <option value="鲜花水果">💐 鲜花水果</option>
                        <option value="零食">🍰 零食</option>
                        <option value="虚拟服务">🎮 虚拟服务</option>
                        <option value="书籍">📚 书籍</option>
                        <option value="运动">⚽ 运动</option>
                        <option value="其他">🎁 其他</option>
                    </select>
                </div>
            </div>
            <div class="field">
                <label>购买链接</label>
                <input type="text" id="edit-link" placeholder="粘贴淘宝/京东链接（选填）">
            </div>

            <div class="btns">
                <button type="button" class="btn-cancel" onclick="toggleAddForm()">取消</button>
                <button type="button" class="btn-primary" onclick="saveNewGift()">保存礼物</button>
            </div>
        </div>
    </div>

    <div class="stats-bar">
        <div class="stat"><span id="stat-total">0</span> 件礼物</div>
        <div class="stat"><span id="stat-want">0</span> 件未收到</div>
    </div>

    <div class="cat-grid" id="cat-grid"></div>
    <div class="tags" id="tags"></div>

    <!-- 搜索 & 排序工具栏 -->
    <div class="filter-toolbar">
        <input type="text" id="search-input" class="search-input" placeholder="🔍 搜索礼物名称..." oninput="onSearchInput(this.value)">
        <button class="sort-btn" id="sort-btn" onclick="cycleSort()">最新优先</button>
    </div>

    <!-- 价格区间筛选 -->
    <div class="price-tags" id="price-tags"></div>

    <!-- 筛选结果计数 -->
    <div class="result-count" id="result-count"></div>

    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">
        <div class="empty-icon">🎀</div>
        <div>许愿池还是空的～</div>
        <div class="empty-sub">点右上角「管理」来添加心愿吧</div>
    </div>

    <!-- 底部感谢语（简化版） -->
    <div class="footer-thanks">
        <div class="thanks-deco">✿ ❀ ✿ ❀ ✿</div>
        <div class="thanks-text">
            —— 感恩遇见 感谢有你 ——
        </div>
        <div class="thanks-deco">✿ ❀ ✿ ❀ ✿</div>
    </div>

    <div class="toast" id="toast"></div>
    <!-- 动态加载 app.js：用时间戳做缓存破坏，确保微信/iOS主屏幕每次都加载最新代码 -->
    <script>
    (function(){
        var s = document.createElement('script');
        s.src = 'app.js?t=' + Date.now();
        s.onerror = function(){ console.error('app.js 加载失败'); };
        document.body.appendChild(s);
    })();
    </script>
</body>
</html>
